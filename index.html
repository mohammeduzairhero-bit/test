        /* ========== HISTORY RENDERING WITH SEARCH ENGINE ========== */
        function renderHistory(filterStr = "") {
            const c = document.getElementById("history");
            c.innerHTML = "";
            const query = filterStr.trim();
            const { terms, filters } = parseSearchQuery(query);
            const isSearching = query.length > 0;

            const matched = [];
            for (const id of Object.keys(chats)) {
                const chat = chats[id];
                if (!chat || chat.deleted) continue;
                if (!isSearching) {
                    matched.push({ id, score: 0, snippet: '' });
                    continue;
                }
                const result = scoreChat(chat, terms, filters);
                if (result) matched.push({ id, score: result.score, snippet: result.snippet });
            }

            if (matched.length === 0) {
                c.innerHTML = `<div class="empty-history">${isSearching ? 'No matches found' : 'No conversations yet'}</div>`;
                return;
            }

            if (isSearching) {
                matched.sort((a, b) => b.score - a.score);
                const g = document.createElement("div");
                g.className = "history-group-label";
                g.textContent = `${matched.length} result${matched.length === 1 ? '' : 's'}`;
                c.appendChild(g);
                matched.forEach(it => {
                    const chat = chats[it.id];
                    const n = document.createElement("div");
                    n.className = `chat-item ${it.id === currentChatId ? 'active' : ''} ${chat.pinned ? 'pinned' : ''}`;
                    const snippetHtml = it.snippet
                        ? `<div style="font-size:11.5px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;">${highlightSnippet(it.snippet, terms)}</div>`
                        : '';
                    n.innerHTML = `<div class="chat-item-body"><div class="chat-title">${escapeHtml(chat.title)}</div>${snippetHtml}</div><svg class="pin-icon"><use href="#i-star-fill"/></svg>`;
                    n.querySelector(".chat-item-body").onclick = () => switchChat(it.id);
                    c.appendChild(n);
                });
                return;
            }

            const pinned = [], today = [], yesterday = [], lastWeek = [], older = [];
            const now = new Date(), startToday = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
            matched.forEach(({ id }) => {
                const t = chats[id].updatedAt || chats[id].timestamp || Date.now();
                const item = { id, time: t };
                if (chats[id].pinned) pinned.push(item);
                else if (t >= startToday) today.push(item);
                else if (t >= startToday - 86400000) yesterday.push(item);
                else if (t >= startToday - 86400000 * 7) lastWeek.push(item);
                else older.push(item);
            });
            [pinned, today, yesterday, lastWeek, older].forEach(a => a.sort((x, y) => y.time - x.time));
            const append = (label, list) => {
                if (!list.length) return;
                const g = document.createElement("div"); g.className = "history-group-label"; g.textContent = label; c.appendChild(g);
                list.forEach(it => {
                    const chat = chats[it.id];
                    const n = document.createElement("div");
                    n.className = `chat-item ${it.id === currentChatId ? 'active' : ''} ${chat.pinned ? 'pinned' : ''}`;
                    n.innerHTML = `<div class="chat-item-body"><div class="chat-title">${escapeHtml(chat.title)}</div></div><svg class="pin-icon"><use href="#i-star-fill"/></svg><div class="chat-item-actions"><button class="chat-action-btn" data-a="r"><svg class="icon"><use href="#i-edit"/></svg></button><button class="chat-action-btn" data-a="d"><svg class="icon"><use href="#i-x"/></svg></button></div>`;
                    n.querySelector(".chat-item-body").onclick = () => switchChat(it.id);
                    n.querySelector('[data-a="r"]').onclick = (e) => { e.stopPropagation(); promptRenameSpecific(it.id); };
                    n.querySelector('[data-a="d"]').onclick = (e) => { e.stopPropagation(); deleteSpecificChat(it.id); };
                    c.appendChild(n);
                });
            };
            append("Pinned", pinned); append("Today", today); append("Yesterday", yesterday); append("Previous 7 Days", lastWeek); append("Older", older);
        }

        /* ========== MARKDOWN COMPILER ========== */
        function escapeHtml(text) {
            return String(text).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
        }
        function formatMarkdown(rawText) {
            if (!rawText) return "";
            const lines = rawText.split('\n');
            let html = '', inCode = false, codeBuf = [], codeLang = 'text', inList = null, inBQ = false, paraBuf = [];
            const flushP = () => { if (paraBuf.length) { const j = paraBuf.join(' ').trim(); if (j) html += `<p>${inlineFormat(j)}</p>`; paraBuf = []; } };
            const closeL = () => { if (inList) { html += `</${inList}>`; inList = null; } };
            const closeBQ = () => { if (inBQ) { html += '</blockquote>'; inBQ = false; } };
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i], trimmed = line.trim();
                if (line.startsWith('```')) {
                    if (inCode) {
                        const uuid = 'code_' + Math.random().toString(36).substr(2, 9);
                        const lang = (codeLang || "text").toLowerCase();
                        const isPreviewable = /^(html|css|javascript|js|jsx|tsx|svg)$/.test(lang);
                        const previewBtn = isPreviewable
                            ? `<button class="code-preview-btn" onclick="toggleCodePreview('${uuid}', '${lang}')"><svg class="icon"><use href="#i-eye"/></svg><span>Preview</span></button>`
                            : '';
                        html += `<div class="code-block" id="cb_${uuid}"><div class="code-header"><span class="code-lang">${escapeHtml(codeLang || "text")}</span><div style="display:flex;gap:4px;align-items:center;">${previewBtn}<button class="code-copy" onclick="copyCodeBlock('${uuid}')"><svg class="icon"><use href="#i-copy"/></svg><span>Copy</span></button></div></div><pre id="${uuid}"><code>${escapeHtml(codeBuf.join('\n'))}</code></pre></div>`;
                        codeBuf = []; inCode = false;
                    } else { flushP(); closeL(); closeBQ(); codeLang = line.slice(3).trim(); inCode = true; }
                    continue;
                }
                if (inCode) { codeBuf.push(line); continue; }
                if (trimmed === '') { flushP(); closeL(); closeBQ(); continue; }
                const h = trimmed.match(/^(#{1,6})\s+(.*)$/);
                if (h) { flushP(); closeL(); closeBQ(); html += `<h${h[1].length}>${inlineFormat(h[2])}</h${h[1].length}>`; continue; }
                if (/^(-{3,}|\*{3,}|_{3,})$/.test(trimmed)) { flushP(); closeL(); closeBQ(); html += '<hr>'; continue; }
                if (/^>\s?/.test(trimmed)) { flushP(); closeL(); if (!inBQ) { html += '<blockquote>'; inBQ = true; } html += inlineFormat(trimmed.replace(/^>\s?/, '')) + ' '; continue; } else if (inBQ) closeBQ();
                const ul = trimmed.match(/^[-+]\s+(.*)$/);
                if (ul) { flushP(); if (inList !== 'ul') { closeL(); html += '<ul>'; inList = 'ul'; } html += `<li>${inlineFormat(ul[1])}</li>`; continue; }
                const ol = trimmed.match(/^\d+\.\s+(.*)$/);
                if (ol) { flushP(); if (inList !== 'ol') { closeL(); html += '<ol>'; inList = 'ol'; } html += `<li>${inlineFormat(ol[1])}</li>`; continue; }
                if (trimmed.includes('|') && i + 1 < lines.length && /^\s*\|?[\s\-:|]+\|?\s*$/.test(lines[i + 1])) {
                    flushP(); closeL(); closeBQ();
                    const hc = trimmed.split('|').map(c => c.trim()).filter((c, x, a) => !(x === 0 && c === '') && !(x === a.length - 1 && c === ''));
                    i++;
                    let t = '<table><thead><tr>' + hc.map(c => `<th>${inlineFormat(c)}</th>`).join('') + '</tr></thead><tbody>';
                    while (i + 1 < lines.length && lines[i + 1].includes('|') && lines[i + 1].trim() !== '') {
                        i++;
                        const rc = lines[i].split('|').map(c => c.trim()).filter((c, x, a) => !(x === 0 && c === '') && !(x === a.length - 1 && c === ''));
                        t += '<tr>' + rc.map(c => `<td>${inlineFormat(c)}</td>`).join('') + '</tr>';
                    }
                    t += '</tbody></table>'; html += t; continue;
                }
                if (inList) closeL();
                paraBuf.push(line);
            }
            if (inCode && codeBuf.length > 0) {
                html += `<div class="code-block"><div class="code-header"><span class="code-lang">${escapeHtml(codeLang || "text")} · streaming</span></div><pre><code>${escapeHtml(codeBuf.join('\n'))}</code></pre></div>`;
            }
            flushP(); closeL(); closeBQ();
            return html;
        }
        function inlineFormat(t) {
            const ic = [];
            let p = t.replace(/`([^`\n]+)`/g, (_, c) => { ic.push(c); return `\u0000IC${ic.length - 1}\u0000`; });
            p = escapeHtml(p);
            p = p.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
            p = p.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
            p = p.replace(/__([^_]+)__/g, '<strong>$1</strong>');
            p = p.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
            p = p.replace(/(^|[^_])_([^_\n]+)_/g, '$1<em>$2</em>');
            p = p.replace(/~~([^~]+)~~/g, '<del>$1</del>');
            p = p.replace(/\u0000IC(\d+)\u0000/g, (_, i) => `<code>${escapeHtml(ic[parseInt(i)])}</code>`);
            return p;
        }
        function copyCodeBlock(id) { const el = document.getElementById(id); if (el) navigator.clipboard.writeText(el.innerText).then(() => showToast("Code copied")); }

        /* ========== LIVE PREVIEW ENGINE ========== */
        function buildPreviewDoc(code, lang) {
            if (lang === 'html' || lang === 'jsx' || lang === 'tsx') {
                // If it's a full HTML doc, use it directly; otherwise wrap it
                if (/<!doctype|<html/i.test(code)) return code;
                return `<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>body{font-family:system-ui,sans-serif;padding:16px;margin:0;}</style></head><body>${code}</body></html>`;
            }
            if (lang === 'css') {
                return `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{font-family:system-ui,sans-serif;padding:16px;margin:0;}${code}</style></head><body><p style="color:#888;font-size:13px;">CSS preview — add HTML elements to see styles applied.</p><div class="preview-demo"><h1>Heading</h1><p>Paragraph text with <a href="#">a link</a>.</p><button>Button</button><ul><li>List item 1</li><li>List item 2</li></ul></div></body></html>`;
            }
            if (lang === 'javascript' || lang === 'js') {
                return `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{font-family:system-ui,sans-serif;padding:16px;margin:0;font-size:14px;}#output{white-space:pre-wrap;background:#f5f5f5;border-radius:8px;padding:12px;margin-top:12px;font-family:monospace;font-size:13px;min-height:40px;color:#333;}h4{margin:0 0 8px;color:#555;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;}</style></head><body><h4>Console Output</h4><div id="output"></div><script>
const _out = document.getElementById('output');
const _log = (...a) => { _out.textContent += a.map(x=>typeof x==='object'?JSON.stringify(x,null,2):String(x)).join(' ') + '\\n'; };
const _orig = {log:console.log,error:console.error,warn:console.warn,info:console.info};
console.log=(...a)=>{_log(...a);_orig.log(...a);};
console.error=(...a)=>{_log('[error]',...a);_orig.error(...a);};
console.warn=(...a)=>{_log('[warn]',...a);_orig.warn(...a);};
console.info=(...a)=>{_log('[info]',...a);_orig.info(...a);};
try{${code}}catch(e){_log('[exception] '+e.message);}
<\/script></body></html>`;
            }
            if (lang === 'svg') {
                return `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f8f8f8;}</style></head><body>${code}</body></html>`;
            }
            return `<!DOCTYPE html><html><body><pre style="font-family:monospace;padding:16px;">${code.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</pre></body></html>`;
        }

        function toggleCodePreview(uuid, lang) {
            const codeBlock = document.getElementById('cb_' + uuid);
            if (!codeBlock) return;

            let panel = codeBlock.querySelector('.code-preview-panel');

        /* ========== DOWNLOAD MANAGER ========== */
        function downloadFile(filename, content, type = "text/plain") {
            const blob = new Blob([content], { type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        function extractFilename(text) {
            const match = (text || "").match(/<<File\s+name="([^"]+)"/i);
            if (match) return match[1];
            if (text.includes("```python")) return "app.py";
            if (text.includes("```json")) return "data.json";
            if (text.includes("```html")) return "index.html";
            if (text.includes("```javascript") || text.includes("```js")) return "script.js";
            if (text.includes("```css")) return "style.css";
            return "download.txt";
        }

        function downloadMessage(id) {
            const chat = chats[currentChatId];
            if (!chat) return;
            const msg = chat.messages.find(m => m.id === id);
            if (!msg) return;
            let targetFilename = extractFilename(msg.content || "");
            if (targetFilename === "download.txt" && chat.title) {
                targetFilename = chat.title.replace(/[^a-z0-9]/gi, '_').toLowerCase().substring(0, 24) + ".txt";
            }
            let mimeType = "text/plain";
            if (targetFilename.endsWith(".html")) mimeType = "text/html";
            if (targetFilename.endsWith(".json")) mimeType = "application/json";
            downloadFile(targetFilename, msg.content, mimeType);
            showToast(`Downloaded as ${targetFilename}`);
        }

        function renderMessageToDOM(msg, role) {

                const panels = `<div class="panel-grid cols-3">${msg.merge.panels.map((p, i) =>
                    `<div class="agent-panel">
<div class="agent-panel-header">

<div class="agent-panel-status">${p.error ? 'error' : 'done'}</div>
</div>
<div class="agent-panel-body">${p.error ? `<span style="color:var(--danger)">${escapeHtml(p.error)}</span>` : renderMarkdownSafe(p.text || '')}</div>

                wrap.innerHTML = banner + panels + merged;
            } else {

                    msg.images.forEach(imgUrl => {
                        combinedHtml += `<div style="margin-bottom:12px;"><img src="${imgUrl}" style="max-width:100%; border-radius:var(--radius); border:1px solid var(--border-soft); box-shadow:var(--shadow-sm);" alt="Gemini Output"></div>`;
                    });

                    }

                }

                // Render user attachments below the text
                if (msg.attachments && msg.attachments.length) {
                    const attRow = document.createElement("div");

                    msg.attachments.forEach(att => {
                        if (att.dataUrl && att.type && att.type.startsWith("image/")) {
                            const img = document.createElement("img");
                            img.className = "msg-attach-img";
                            img.src = att.dataUrl;
                            img.alt = att.name;

                            const chip = document.createElement("div");
                            chip.className = "msg-attach-file";
                            chip.innerHTML = `<span class="msg-attach-file-icon">${(att.name.split('.').pop() || 'FILE').toUpperCase().slice(0, 4)}</span><span>${escapeHtml(att.name)}</span>`;
                            attRow.appendChild(chip);

                    });
                    bubble.appendChild(attRow);
                }

                wrap.appendChild(bubble);

            const actions = document.createElement("div");

            } else {
                act += `<button class="action-btn" onclick="downloadMessage('${msgId}')"><svg class="icon"><use href="#i-download"/></svg><span>Download</span></button>`;
                act += `<button class="action-btn" onclick="regenerateMessage('${msgId}')"><svg class="icon"><use href="#i-refresh"/></svg><span>Retry</span></button>`;
                act += `<button class="action-btn ${msg.rating === 'up' ? 'liked' : ''}" onclick="rateMessage('${msgId}','up')"><svg class="icon"><use href="#i-thumbs-up"/></svg></button>`;
                act += `<button class="action-btn ${msg.rating === 'down' ? 'disliked' : ''}" onclick="rateMessage('${msgId}','down')"><svg class="icon"><use href="#i-thumbs-down"/></svg></button>`;
                act += `<button class="action-btn" onclick="readAloud('${msgId}')"><svg class="icon"><use href="#i-volume"/></svg></button>`;
            }
            actions.innerHTML = act;

        /* ========== PROMPT BUILDER WITH ASSISTANT CONTROLS ========== */
        function buildMessageString(chat, isContinuation = false) {
            // Build chat history; for user messages with image attachments, include vision URLs
            const chatHistory = chat.messages.map(m => {
                if (m.role === 'user' && m.attachments && m.attachments.some(a => a.dataUrl)) {
                    const imageAttachments = m.attachments.filter(a => a.dataUrl);
                    const imgNote = imageAttachments.map(a => `[Image: ${a.name}]`).join(' ');
                    return `User: ${m.content}${imgNote ? ' ' + imgNote : ''}`;
                }
                return `${m.role === 'user' ? 'User' : 'Assistant'}: ${m.content}`;
            }).join('\n\n');

            const parts = [];
            if (systemPrompt?.trim()) parts.push(systemPrompt.trim());

            const proj = chat.projectId && projects[chat.projectId];
            if (proj?.instructions?.trim()) {
                parts.push(`Project instructions:\n${proj.instructions.trim()}`);
            }

            const ctl = [];
            if (assistantControls.verbosity === "short") ctl.push("Keep responses concise.");
            if (assistantControls.verbosity === "detailed") ctl.push("Give thorough, detailed responses.");
            if (assistantControls.style === "bullets") ctl.push("Prefer bullet points where possible.");
            if (assistantControls.style === "narrative") ctl.push("Write in flowing prose, minimal lists.");
            if (assistantControls.style === "code-first") ctl.push("Lead with code, keep prose minimal.");
            if (assistantControls.cite) ctl.push("When making factual claims, include reputable source links.");
            if (ctl.length) parts.push(ctl.join(' '));

            const sys = parts.length ? `System: ${parts.join('\n\n')}\n\n` : "";
            let fullPrompt = `${sys}${chatHistory}`;
            if (isContinuation) {
                fullPrompt += "\n\nThe previous response was cut off. Continue exactly where it left off and avoid repeating content.";
            }
            return fullPrompt;
        }

        /* ========== GEMINI MULTIMODAL FEATURE INTELLIGENCE ========== */
        async function callGeminiMultimodal(modelId, prompt, signal) {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${apiKey}`
                },
                signal,
                body: JSON.stringify({
                    model: modelId,
                    messages: [{ role: "user", content: prompt }],
                    modalities: ["text", "image"]
                })
            });

            if (!response.ok) {
                const text = await response.text().catch(() => "");
                throw new Error(`Gemini ${response.status}: ${text}`);
            }

            const data = await response.json();
            const message = data.choices?.[0]?.message || {};
            const candidatesParts = data.candidates?.[0]?.content?.parts || [];

            let text = "";
            const images = [];

            if (Array.isArray(message.images)) {
                for (const im of message.images) {
                    const url = im.image_url?.url || im.url;
                    if (url) images.push(url);
                }
            }

            if (typeof message.content === "string") {
                text = message.content;
            }

            if (Array.isArray(message.content)) {
                for (const part of message.content) {
                    if (part.type === "text" && part.text) {
                        text += part.text;
                    } else if (part.type === "image_url" && part.image_url?.url) {
                        images.push(part.image_url.url);
                    } else if (part.inline_data?.data) {
                        const mime = part.inline_data.mime_type || "image/png";
                        images.push(`data:${mime};base64,${part.inline_data.data}`);
                    }
                }
            }

            for (const part of candidatesParts) {
                if (part.text) {
                    text += part.text;
                } else if (part.inlineData?.data) {
                    const mime = part.inlineData.mimeType || "image/png";
                    images.push(`data:${mime};base64,${part.inlineData.data}`);
                } else if (part.inline_data?.data) {
                    const mime = part.inline_data.mime_type || "image/png";
                    images.push(`data:${mime};base64,${part.inline_data.data}`);
                }
            }

            if (images.length === 0) {
                const b64 = data.image || data.b64_json || data.data?.[0]?.b64_json;
                if (b64) images.push(`data:image/png;base64,${b64}`);
                const url = data.url || data.data?.[0]?.url;
                if (url) images.push(url);
            }

            return { text, images };
        }

        async function callModel(modelId, messageString, signal, onDelta, onThinking, imageAttachments) {
            // Build body: if there are image attachments, use messages array with vision content
            let bodyObj;
            if (imageAttachments && imageAttachments.length > 0) {
                const contentParts = imageAttachments.map(att => ({
                    type: "image_url",
                    image_url: { url: att.dataUrl }
                }));
                contentParts.push({ type: "text", text: messageString });
                bodyObj = {
                    model: modelId,
                    max_tokens: MAX_TOKENS,
                    effort: "high",
                    stream: true,
                    messages: [{ role: "user", content: contentParts }]
                };
            } else {
                bodyObj = {
                    message: messageString,
                    model: modelId,
                    max_tokens: MAX_TOKENS,
                    effort: "high",
                    stream: true
                };
            }
            const response = await fetch(API_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${apiKey}`
                },
                signal,
                body: JSON.stringify(bodyObj)
            });
            if (!response.ok) throw new Error(`Gateway ${response.status}`);
            const contentType = response.headers.get("content-type") || "";
            let full = "";
            let thinkingBuf = "";   // accumulated thinking text
            let inThinkTag = false; // inside <think>...</think> in text stream

            // Helper: peel off <think>...</think> blocks embedded in text delta
            function processTextDelta(raw) {
                let remaining = raw;
                while (remaining.length > 0) {
                    if (inThinkTag) {
                        const closeIdx = remaining.indexOf('</think>');
                        if (closeIdx === -1) {
                            // still inside think block
                            thinkingBuf += remaining;
                            if (onThinking) onThinking(remaining, thinkingBuf);
                            remaining = "";
                        } else {
                            const chunk = remaining.slice(0, closeIdx);
                            thinkingBuf += chunk;
                            if (chunk && onThinking) onThinking(chunk, thinkingBuf);
                            inThinkTag = false;
                            remaining = remaining.slice(closeIdx + 8); // skip </think>
                        }
                    } else {
                        const openIdx = remaining.indexOf('<think>');
                        if (openIdx === -1) {
                            // plain text
                            if (remaining) { full += remaining; if (onDelta) onDelta(remaining, full); }
                            remaining = "";
                        } else if (openIdx > 0) {
                            // text before the tag
                            const pre = remaining.slice(0, openIdx);
                            full += pre; if (onDelta) onDelta(pre, full);
                            remaining = remaining.slice(openIdx);
                        } else {
                            inThinkTag = true;
                            remaining = remaining.slice(7); // skip <think>
                        }
                    }
                }
            }

            if (contentType.includes("application/json") && !contentType.includes("text/event-stream")) {
                const data = await response.json();
                // Check for thinking field in non-streaming response
                const thinkText = data.thinking || data.choices?.[0]?.message?.thinking || "";
                if (thinkText && onThinking) {
                    for (const ch of thinkText) { thinkingBuf += ch; onThinking(ch, thinkingBuf); }
                }
                const rawContent = data.choices?.[0]?.message?.content || data.choices?.[0]?.text || data.content || data.text || data.response || (typeof data === 'string' ? data : JSON.stringify(data));
                processTextDelta(rawContent);
            } else {
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                outer: while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, { stream: true });
                    for (const line of chunk.split('\n')) {
                        let payload = null;
                        if (line.startsWith('data: ')) {
                            const p = line.replace('data: ', '').trim();
                            if (p === '[DONE]' || p === '{"done":true}') break outer;
                            if (p) { try { payload = JSON.parse(p); } catch (e) { } }
                        } else if (line.trim() && !line.startsWith(':')) {
                            try { payload = JSON.parse(line); } catch (e) { }
                        }
                        if (payload) {
                            // Anthropic extended-thinking: separate thinking delta
                            const thinkDelta = payload.thinking || payload.delta?.thinking || payload.choices?.[0]?.delta?.thinking || "";
                            if (thinkDelta && onThinking) {
                                thinkingBuf += thinkDelta;
                                onThinking(thinkDelta, thinkingBuf);
                            }
                            // Regular content delta — may contain <think> tags
                            const raw = payload.delta || payload.choices?.[0]?.delta?.content || payload.content || payload.text || payload.response || "";
                            if (raw) processTextDelta(raw);
                        }
                    }
                }
            }
            return full;
        }

        /* ========== SEND WITH UNDO GRACE PERIOD ========== */
        async function sendMessage() {
            const ta = document.getElementById("prompt");
            const text = ta.value.trim();
            if ((!text && !pendingAttachments.length) || activeAbortController) return;
            if (!apiKey) { showToast("Still loading… please wait a moment"); return; }
            if (!selectedModel) { showToast("Still loading models… please wait"); return; }
            if (!currentChatId) newChat();
            const chat = chats[currentChatId];
            if (chat.messages.length === 0) {
                chat.title = text.substring(0, 40) + (text.length > 40 ? "…" : "");
                document.getElementById("chatTitle").textContent = chat.title;
            }
            chat.updatedAt = Date.now();
            // Snapshot & clear attachments
            const snapshotAttachments = pendingAttachments.slice();
            clearAttachments();

            // Build attachment context to append to the prompt text
            let attachmentContext = "";
            for (const att of snapshotAttachments) {
                if (!isImageType(att.type) && att.textContent != null) {
                    const label = att.name;
                    const trimmed = att.textContent.length > 80000
                        ? att.textContent.slice(0, 80000) + "\n... [truncated]"
                        : att.textContent;
                    attachmentContext += `\n\n--- Attached file: ${label} ---\n${trimmed}\n--- End of ${label} ---`;
                }
            }

            const userMsg = {
                id: 'msg_' + crypto.randomUUID(), role: "user",
                content: text + attachmentContext,
                displayContent: text,
                attachments: snapshotAttachments.map(a => ({
                    name: a.name, size: a.size, type: a.type,
                    dataUrl: isImageType(a.type) ? a.dataUrl : null
                })),
                timestamp: Date.now()
            };
            chat.messages.push(userMsg);
            renderMessageToDOM(userMsg, "user");
            renderHistory();
            ta.value = ""; ta.style.height = "28px";

            let undone = false;
            showUndoToast(() => {
                undone = true;
                chat.messages = chat.messages.filter(m => m.id !== userMsg.id);
                document.getElementById(userMsg.id)?.remove();
                ta.value = text;
                ta.dispatchEvent(new Event('input'));
                if (chat.messages.length === 0) {
                    document.getElementById("chatTitle").textContent = "";
                    const inner = document.getElementById("messagesInner");
                    if (!inner.querySelector("#welcomeView")) {
                        inner.appendChild(createWelcomeFallback());
                    }
                }
                renderHistory();
            });

            await new Promise(r => { pendingSendTimer = setTimeout(r, 50); });
            if (undone) return;

            if (mergeMode) await streamMergeResponse(chat);
            else await streamAIResponse(chat);
        }

        function showUndoToast(onUndo) {
            const container = document.getElementById("toastContainer");
            const toast = document.createElement("div");
            toast.className = "toast";
            toast.innerHTML = `<span>Sending…</span>`;
            const btn = document.createElement("button");
            btn.textContent = "Undo";
            btn.style.cssText = "background:none;border:none;color:var(--accent);font-weight:600;cursor:pointer;padding:0;margin-left:8px;pointer-events:auto;";
            btn.onclick = () => { onUndo(); if (pendingSendTimer) clearTimeout(pendingSendTimer); toast.remove(); };
            toast.style.pointerEvents = "auto";
            toast.appendChild(btn);
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 500);
        }

        async function streamAIResponse(chat) {
            setGeneratingState(true);
            userScrolledUp = false;

            const inner = document.getElementById("messagesInner");
            const ind = document.createElement("div");
            ind.className = "message ai";
            ind.id = "typingIndicator";
            ind.innerHTML = `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
            inner.appendChild(ind);
            scrollToBottom();

            activeAbortController = new AbortController();

            const aiMsg = {
                id: 'msg_' + crypto.randomUUID(),
                role: "assistant",
                content: "",
                model: selectedModel,
                timestamp: Date.now()
            };

            const lastUserMsg = chat.messages.filter(m => m.role === "user").slice(-1)[0]?.content || "";

            if (lastUserMsg.startsWith("/image ") || selectedModel.includes("gemini")) {
                try {
                    const promptText = lastUserMsg.replace(/^\/image\s+/, "");
                    const result = await callGeminiMultimodal(selectedModel, promptText, activeAbortController.signal);

                    ind.remove();
                    aiMsg.content = result.text;
                    aiMsg.images = result.images;
                    chat.messages.push(aiMsg);
                    renderMessageToDOM(aiMsg, "ai");
                    saveChats();
                    return;
                } catch (err) {
                    if (lastUserMsg.startsWith("/image ")) {
                        ind.remove();
                        aiMsg.content = `Image Generation Failed: ${err.message}`;
                        chat.messages.push(aiMsg);
                        renderMessageToDOM(aiMsg, "ai");
                        saveChats();
                        return;
                    }
                } finally {
                    if (lastUserMsg.startsWith("/image ")) {
                        activeAbortController = null;
                        setGeneratingState(false);
                        return;
                    }
                }
            }

            let wrap = null, bubble = null;
            let fullText = "";

            // --- thinking panel state ---
            let thinkingPanel = null, thinkingBody = null, thinkingLabel = null, thinkingRing = null, thinkingCount = null;
            let thinkingChars = 0;

            function ensureThinkingPanel() {
                if (thinkingPanel) return;
                // Remove typing indicator, create message wrap first
                if (!wrap) {
                    ind.remove();
                    wrap = renderMessageToDOM(aiMsg, "ai");
                    bubble = wrap.querySelector(".bubble");
                }
                // Insert thinking panel before the bubble
                thinkingPanel = document.createElement("div");
                thinkingPanel.className = "thinking-panel";
                thinkingPanel.innerHTML = `
                    <div class="thinking-header" onclick="this.parentElement.classList.toggle('collapsed')">
                        <div class="thinking-dot-ring streaming"></div>
                        <span class="thinking-label streaming">Thinking…</span>
                        <span class="thinking-token-count"></span>
                        <svg class="thinking-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                    </div>
                    <div class="thinking-body"></div>`;
                thinkingBody = thinkingPanel.querySelector(".thinking-body");
                thinkingLabel = thinkingPanel.querySelector(".thinking-label");
                thinkingRing = thinkingPanel.querySelector(".thinking-dot-ring");
                thinkingCount = thinkingPanel.querySelector(".thinking-token-count");
                wrap.insertBefore(thinkingPanel, bubble);
            }

            function onThinkingDelta(delta, total) {
                ensureThinkingPanel();
                thinkingChars = total.length;
                // Stream text in, with blinking cursor on last line
                thinkingBody.textContent = total;
                const cursor = document.createElement("span");
                cursor.className = "thinking-cursor";
                thinkingBody.appendChild(cursor);
                // Auto-scroll thinking body if near bottom
                if (thinkingBody.scrollHeight - thinkingBody.scrollTop < thinkingBody.clientHeight + 60) {
                    thinkingBody.scrollTop = thinkingBody.scrollHeight;
                }
                thinkingCount.textContent = thinkingChars.toLocaleString() + " chars";
                if (!userScrolledUp) scrollToBottom();
            }

            function finalizeThinkingPanel() {
                if (!thinkingPanel) return;
                // Remove cursor
                const cursor = thinkingBody.querySelector(".thinking-cursor");
                if (cursor) cursor.remove();
                // Update header to done state
                thinkingRing.className = "thinking-dot-ring done";
                thinkingLabel.className = "thinking-label";
                thinkingLabel.textContent = "Thought for " + thinkingChars.toLocaleString() + " chars";
                // Auto-collapse after finishing
                thinkingPanel.classList.add("collapsed");
            }

            try {
                const prompt = buildMessageString(chat);

                // Pass image attachments from last user message for vision
                const lastUserMsg = chat.messages.filter(m => m.role === 'user').slice(-1)[0];
                const imgAttachments = (lastUserMsg && lastUserMsg.attachments || []).filter(a => a.dataUrl);

                await callModel(
                    selectedModel,
                    prompt,
                    activeAbortController.signal,
                    (delta, total) => {
                        fullText = total;
                        if (!wrap) {
                            ind.remove();
                            wrap = renderMessageToDOM(aiMsg, "ai");
                            bubble = wrap.querySelector(".bubble");
                        }
                        aiMsg.content = total;
                        bubble.innerHTML = renderMarkdownSafe(total);
                        if (!userScrolledUp) scrollToBottom();
                    },
                    onThinkingDelta,
                    imgAttachments.length ? imgAttachments : null
                );

                finalizeThinkingPanel();
                aiMsg.content = fullText;
                if (!chat.messages.some(m => m.id === aiMsg.id)) {
                    chat.messages.push(aiMsg);
                }
                saveChats();

            } catch (err) {
                console.error("Stream error:", err);
                finalizeThinkingPanel();
                if (err.name === "AbortError") {
                    // user stopped — do nothing
                } else if (fullText.length > 0) {
                    aiMsg.content = fullText;
                    if (!chat.messages.some(m => m.id === aiMsg.id)) chat.messages.push(aiMsg);
                    saveChats();
                } else {
                    // Show error inline so the user knows what happened
                    if (ind && ind.parentNode) ind.remove();
                    const errMsg = { id: aiMsg.id, role: "assistant", content: "", timestamp: Date.now() };
                    const errWrap = renderMessageToDOM(errMsg, "ai");
                    errWrap.querySelector(".bubble").innerHTML =
                        `<span style="color:var(--danger)">⚠ Request failed: ${escapeHtml(err.message)}. Check your API key or model selection in Settings.</span>`;
                }
            } finally {
                activeAbortController = null;
                setGeneratingState(false);
                if (ind && ind.parentNode) ind.remove();
            }
        }

        /* ========== MERGE RESPONSE WITH SAFE RENDERING ========== */
        async function streamMergeResponse(chat) {
            setGeneratingState(true); userScrolledUp = false;
            const inner = document.getElementById("messagesInner");
            const aiMsg = {
                id: 'msg_' + crypto.randomUUID(),
                role: "assistant",
                content: "",
                model: mergeConfig.judge,
                merge: { judge: mergeConfig.judge, panels: mergeConfig.models.map(m => ({ model: m, text: "", status: "thinking" })) },
                timestamp: Date.now()
            };
            const wrap = renderMessageToDOM(aiMsg, "ai");

            if (!apiKey) { wrap.querySelector(".merged-result .bubble").innerHTML = `<span style="color:var(--danger)">API key not loaded.</span>`; setGeneratingState(false); return; }

            activeAbortController = new AbortController();
            const baseStr = buildMessageString(chat);

            const updatePanel = (idx) => {
                const panel = wrap.querySelectorAll(".agent-panel")[idx];
                if (!panel) return;
                panel.querySelector(".agent-dot").className = `agent-dot ${aiMsg.merge.panels[idx].status}`;
                panel.querySelector(".agent-panel-status").textContent = aiMsg.merge.panels[idx].error ? 'error' : aiMsg.merge.panels[idx].status;
                panel.querySelector(".agent-panel-body").innerHTML = aiMsg.merge.panels[idx].error
                    ? `<span style="color:var(--danger)">${escapeHtml(aiMsg.merge.panels[idx].error)}</span>`
                    : renderMarkdownSafe(aiMsg.merge.panels[idx].text);
            };

            const panelPromises = mergeConfig.models.map((mid, idx) =>
                callModel(mid, baseStr, activeAbortController.signal, (_, total) => {
                    aiMsg.merge.panels[idx].text = total;
                    updatePanel(idx);
                }).then(text => {
                    aiMsg.merge.panels[idx].status = "done";
                    aiMsg.merge.panels[idx].text = text;
                    updatePanel(idx);
                    return text;
                }).catch(err => {
                    aiMsg.merge.panels[idx].status = "error";
                    aiMsg.merge.panels[idx].error = err.message || "Failed";
                    updatePanel(idx);
                    return null;
                })
            );

            const results = await Promise.all(panelPromises);
            const valid = results.map((r, i) => ({ r, m: mergeConfig.models[i] })).filter(x => x.r);

            if (valid.length === 0) {
                wrap.querySelector(".merged-result .bubble").innerHTML = `<span style="color:var(--danger)">All models failed.</span>`;
                activeAbortController = null; setGeneratingState(false); return;
            }

            const judgePrompt = `You are a synthesis judge. The user asked the question below. Three independent AI models answered. Your job: produce the single best final answer for the user by combining the strongest parts of each, correcting errors, and removing repetition. Speak directly to the user — do not mention the models or that there was a comparison.

User question
${chat.messages.filter(m => m.role === 'user').slice(-1)[0]?.content || ''}

${valid.map((v, i) => `# Answer from model ${i + 1} (${modelName(v.m)})\n${v.r}`).join('\n\n')}

Final synthesized answer:`;

            const mergedBubble = wrap.querySelector(".merged-result .bubble");
            mergedBubble.innerHTML = `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;

            try {
                const final = await callModel(mergeConfig.judge, judgePrompt, activeAbortController.signal, (_, total) => {
                    aiMsg.content = total;
                    mergedBubble.innerHTML = renderMarkdownSafe(total);
                    if (!userScrolledUp) scrollToBottom();
                });
                aiMsg.content = final;
                chat.messages.push(aiMsg);
                saveChats();
            } catch (err) {
                mergedBubble.innerHTML = `<span style="color:var(--danger)">Judge failed: ${escapeHtml(err.message)}</span>`;
            } finally {
                activeAbortController = null;
                setGeneratingState(false);
            }
        }

        /* ========== IMAGE STUDIO ENGINE AND SYSTEM HANDLERS ========== */
        const imageForm = document.getElementById("imageForm");
        const imageInput = document.getElementById("imageInput");
        const imageModel = document.getElementById("imageModel");
        const imageMessages = document.getElementById("imageMessages");

        function appendPromptBubble(prompt) {
            const wrap = document.createElement("div");
            wrap.className = "img-bubble";

            const label = document.createElement("div");
            label.className = "prompt-label";
            label.textContent = prompt;

            const loading = document.createElement("div");
            loading.className = "loading";
            loading.textContent = "Generating synthesis payload…";

            wrap.appendChild(label);
            wrap.appendChild(loading);
            imageMessages.appendChild(wrap);
            imageMessages.scrollTop = imageMessages.scrollHeight;
            return { wrap, loading };
        }

        function resolveImage({ loading }, src) {
            loading.classList.remove("loading");
            loading.textContent = "";
            const img = document.createElement("img");
            img.src = src;
            img.loading = "lazy";
            img.addEventListener("click", () => window.open(src, "_blank"));
            loading.replaceWith(img);
            imageMessages.scrollTop = imageMessages.scrollHeight;
        }

        function showError({ loading }, msg) {
            loading.className = "error-container";
            loading.textContent = `⚠️ Generation Fault: ${msg}`;
            imageMessages.scrollTop = imageMessages.scrollHeight;
        }

        imageForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const prompt = imageInput.value.trim();
            if (!prompt) return;

            imageInput.value = "";
            imageAbort?.abort();
            imageAbort = new AbortController();

            const bubble = appendPromptBubble(prompt);

            try {
                const { images, text } = await callGeminiMultimodal(
                    imageModel.value, prompt, imageAbort.signal
                );

                if (images && images.length > 0) {
                    resolveImage(bubble, images[0]);
                } else {
                    showError(bubble, text || "No explicit multi-modal media frames returned by the gateway configuration.");
                }
            } catch (err) {
                showError(bubble, err.message);
            }
        });

        /* ========== EDIT / REGENERATE ========== */
        function editMessage(id) {
            const chat = chats[currentChatId];
            if (!chat) return;
            const idx = chat.messages.findIndex(m => m.id === id);
            if (idx === -1) return;
            openCustomModal({
                title: "Edit message", showTextarea: true, defaultValue: chat.messages[idx].content,
                onConfirm: async (t) => {
                    if (!t.trim() || t.trim() === chat.messages[idx].content) return;
                    chat.messages[idx].content = t.trim();
                    chat.messages = chat.messages.slice(0, idx + 1);
                    switchChat(currentChatId);
                    if (mergeMode) await streamMergeResponse(chat); else await streamAIResponse(chat);
                }
            });
        }
        async function regenerateMessage(id) {
            const chat = chats[currentChatId];
            if (!chat) return;
            const idx = chat.messages.findIndex(m => m.id === id);
            if (idx === -1) return;
            chat.messages = chat.messages.slice(0, idx);
            switchChat(currentChatId);
            if (mergeMode) await streamMergeResponse(chat); else await streamAIResponse(chat);
        }

        /* ========== BACKUP IMPORT / EXPORT ========== */
        function exportChats() {
            const data = JSON.stringify({ chats, projects, version: 2 }, null, 2);
            downloadFile(`claude_backup_${Date.now()}.json`, data, "application/json");
            showToast("Backup downloaded");
        }
        function importChats(file) {
            if (!file) return;
            const r = new FileReader();
            r.onload = (e) => {
                try {
                    const parsed = JSON.parse(e.target.result);
                    if (parsed.chats) { Object.assign(chats, parsed.chats); if (parsed.projects) Object.assign(projects, parsed.projects); }
                    else Object.assign(chats, parsed);
                    saveChats(); renderHistory();
                    const k = Object.keys(chats).filter(x => !chats[x].deleted);
                    if (k.length) switchChat(k[0]);
                    showToast("Imported successfully");
                } catch (err) { showToast("Invalid file format"); }
            };
            r.readAsText(file);
        }

        /* ========== EVENT LISTENERS ========== */
        window.addEventListener("beforeunload", () => saveChats());
        document.addEventListener("keydown", e => {
            if (e.key === '?' && !e.target.matches('input, textarea')) {
                e.preventDefault();
                showShortcutsPalette();
            }
            if (e.altKey && e.key.toLowerCase() === 'n') { e.preventDefault(); newChat(); }
            if ((e.metaKey || e.ctrlKey) && e.key === '/') { e.preventDefault(); document.getElementById("searchBox").focus(); }
            if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key.toLowerCase() === 'm') { e.preventDefault(); toggleMergeMode(); }
            if (e.key === "Escape" && activeAbortController) abortGeneration();
        });
        document.getElementById("prompt").addEventListener("keydown", e => {
            if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });
        // Paste images directly into the chat input
        document.getElementById("prompt").addEventListener("paste", function (e) {
            const items = (e.clipboardData || e.originalEvent && e.originalEvent.clipboardData || {}).items;
            if (!items) return;
            const imageFiles = [];
            for (const item of items) {
                if (item.kind === 'file' && item.type.startsWith('image/')) {
                    const file = item.getAsFile();
                    if (file) imageFiles.push(file);
                }
            }
            if (imageFiles.length) {
                e.preventDefault();
                handleAttachFiles(imageFiles);

        });

        /* ========== INITIALIZE APPLICATION ========== */
        async function initializeApp() {
            // 1. Synchronous setup
            loadChats();
            initTheme();

            // 2. Load models from cache synchronously so selectedModel is valid before UI shows
            try {
                const cached = JSON.parse(localStorage.getItem(MODELS_CACHE_KEY) || "null");
                if (cached && Array.isArray(cached.groups) && cached.flat && cached.flat.length) {
                    AVAILABLE_MODELS = cached.groups;
                    FLAT_MODELS = cached.flat;
                    ensureValidSelection();
                    ensureMergeConfigDefaults();
                }
            } catch (e) { }

            // 3. Show UI immediately (selectedModel now set from cache if available)
            updateModelUI();
            if (currentChatId && chats[currentChatId]) switchChat(currentChatId);
            else newChat();

            // 4. Refresh key and models from network in background (parallel)
            await Promise.all([loadKey(), loadAvailableModels()]);
        }
        initializeApp();
    </script>
</body>

</html>
